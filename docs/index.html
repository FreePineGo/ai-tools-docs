<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Publisher Agent 文档中心</title>
    <meta name="description" content="完整的 AI 工具使用指南和最佳实践">
    
    <!-- Docsify Theme -->
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.min.css" />
    
    <style>
        .app-name-link img {
            max-height: 40px;
        }
        
        .markdown-section {
            max-width: 900px;
        }
        
        .markdown-section img {
            max-width: 100%;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script>
        window.$docsify = {
            name: '🤖 AI Publisher Agent',
            repo: 'https://github.com/FreePineGo/ai-tools-docs',
            homepage: 'README.md',
            loadSidebar: true,
            loadNavbar: true,
            subMaxLevel: 3,
            auto2top: true,
            search: {
                maxAge: 86400000,
                paths: [
                    '/docs/openclaw/',
                    '/docs/claude-code/',
                    '/docs/codex/',
                    '/docs/guides/'
                ],
                placeholder: '搜索文档...',
                noData: '找不到结果',
                depth: 4
            },
            pagination: {
                previousText: '上一篇',
                nextText: '下一篇',
                crossChapter: true,
                crossChapterText: true
            },
            plugins: [
                function(hook, vm) {
                    hook.beforeEach(function(html) {
                        var url = 'https://github.com/FreePineGo/ai-tools-docs/blob/main/' + vm.route.file;
                        var editHtml = '[:memo: 在 GitHub 上编辑](" + url + ")\n';
                        return editHtml + html;
                    });
                    
                    hook.afterEach(function(html) {
                        var footer = [
                            '<hr/>',
                            '<footer style="text-align: center; margin-top: 50px;">',
                            '<span>最后更新：' + new Date().toLocaleDateString('zh-CN') + '</span> | ',
                            '<span>维护者：AI Publisher Agent 团队</span>',
                            '</footer>'
                        ].join('');
                        return html + footer;
                    });
                }
            ]
        };
    </script>
    
    <!-- Docsify -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    
    <!-- Search -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    
    <!-- Zoom Image -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
    
    <!-- Emoji -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
    
    <!-- External Scripts -->
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-jsx.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-tsx.min.js"></script>
</body>
</html>
