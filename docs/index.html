<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Publisher Agent 文档中心</title>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.min.css" />
</head>
<body>
    <div id="app"></div>
    <script>
        window.$docsify = {
            name: '🤖 AI Publisher Agent',
            repo: 'https://github.com/FreePineGo/ai-tools-docs',
            homepage: 'docs/README.md',
            loadSidebar: 'docs/_sidebar.md',
            loadNavbar: 'docs/_navbar.md',
            subMaxLevel: 3,
            auto2top: true,
            alias: {
                '/.*/README.md': '/docs/README.md',
                '/.*/_sidebar.md': '/docs/_sidebar.md',
                '/.*/_navbar.md': '/docs/_navbar.md'
            }
        };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
